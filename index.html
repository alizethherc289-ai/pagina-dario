<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Página Dario</title>

<style>

body{
margin:0;
font-family: Arial;
text-align:center;
color:white;
background: radial-gradient(circle at center, white 0%, #2d6cdf 45%, #0a2a6b 100%);
}

/* TITULO */
.titulo{
margin-top:30px;
}

/* AUDIO */
.cancion{
width:420px;
margin:40px auto;
}

audio{
width:100%;
}

/* FORMULARIO */
.formulario{
width:600px;
margin:40px auto;
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:12px;
box-shadow:0px 10px 25px rgba(0,0,0,0.4);
color:black;
text-align:left;
}

input, select{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.boton{
margin-top:20px;
width:100%;
padding:10px;
background:#2d6cdf;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* VIDEO */
.video{
width:560px;
margin:60px auto;
}

video{
width:100%;
border-radius:15px;
}

</style>

</head>
<body>

<h1 class="titulo">Mi página Dario</h1>

<!-- AUDIO -->
<div class="cancion">
<audio controls>
<source src="audio.mp3" type="audio/mpeg">
Tu navegador no soporta audio.
</audio>
</div>

<!-- FORMULARIO -->
<div class="formulario">
<form>

Nombre del alumno:
<input type="text" name="nombre">

<br><br>

Semestre:
<select name="semestre">
<option>2°</option>
<option>4°</option>
<option>6°</option>
</select>

<br><br>

Grupo:
<select name="grupo">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>FM</option>
<option>SH</option>
<option>EA</option>
<option>QB</option>
</select>

<br><br>

Fecha de nacimiento:
<input type="date" name="fecha">

<input type="submit" class="boton" value="Enviar">

</form>
</div>

<!-- VIDEO -->
<div class="video">
<video controls>
<source src="video.mp4" type="video/mp4">
Tu navegador no soporta video.
</video>
</div>

</body>
</html>
